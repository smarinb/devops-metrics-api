apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-api
  namespace: metrics-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: metrics-api
  template:
    metadata:
      labels:
        app: metrics-api
    spec:
      containers:
        - name: api
          image: ghcr.io/smarinb/devops-metrics-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: metrics-api-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-api-service
  namespace: metrics-api
spec:
  selector:
    app: metrics-api
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
