name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: metrics_user
          POSTGRES_PASSWORD: metrics_pass
          POSTGRES_DB: devops_metrics_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://metrics_user:metrics_pass@localhost:5433/devops_metrics_test
          JWT_SECRET_KEY: test-secret-key
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: 30
        run: |
          pytest --cov=app tests/ --cov-report=term-missing
