services:
  db:
    image: postgres:16-alpine
    container_name: metrics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: metrics_user
      POSTGRES_PASSWORD: metrics_pass
      POSTGRES_DB: devops_metrics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
