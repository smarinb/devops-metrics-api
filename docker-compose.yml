services:
  api:
    build: .
    container_name: metrics-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://metrics_user:metrics_pass@db:5432/devops_metrics
      JWT_SECRET_KEY: change-this-to-a-random-secret-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 30
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: metrics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: metrics_user
      POSTGRES_PASSWORD: metrics_pass
      POSTGRES_DB: devops_metrics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  test-db:
    image: postgres:16-alpine
    container_name: metrics-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: metrics_user
      POSTGRES_PASSWORD: metrics_pass
      POSTGRES_DB: devops_metrics_test
    ports:
      - "5433:5432"

volumes:
  postgres-data:
